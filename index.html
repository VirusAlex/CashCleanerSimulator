<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash Cleaner Calculator</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-5HKL1D0THD"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-5HKL1D0THD');
</script>
<body>
    <div class="container">
        <!-- Language Switcher -->
        <div class="language-switcher">
            <button class="lang-btn" data-lang="en">🇺🇸 EN</button>
            <span class="lang-separator">|</span>
            <button class="lang-btn" data-lang="ru">🇷🇺 RU</button>
        </div>

        <!-- GitHub Link -->
        <a href="https://github.com/VirusAlex/CashCleanerSimulator" class="github-link" target="_blank" rel="noopener">
            <i class="fab fa-github"></i>
            <span data-i18n="viewOnGitHub">View on GitHub</span>
        </a>

        <!-- Steam Guide Link -->
        <a href="https://steamcommunity.com/sharedfiles/filedetails/?id=3509702626" class="steam-link" target="_blank" rel="noopener">
            <i class="fab fa-steam"></i>
            <span data-i18n="viewOnSteam">View on Steam</span>
        </a>

        <div class="header">
            <h1><i class="fas fa-money-bill-wave"></i> <span data-i18n="title">Cash Cleaner Calculator</span></h1>
            <p data-i18n="subtitle">Calculate cash packaging into bundles and blocks</p>
        </div>

        <div class="main-content">
            <div class="input-panel">
                <h2><i class="fas fa-sliders-h"></i> <span data-i18n="orderParams">Order Parameters</span></h2>
                
                <form id="calculatorForm">
                    <div class="form-group">
                        <label for="amount">
                            <span data-i18n="orderAmount">Order Amount</span>
                            <span class="info-tooltip" data-tooltip-i18n="amountTooltip" data-tooltip="Amount must be divisible by 100">
                                <i class="fas fa-info-circle"></i>
                            </span>
                        </label>
                        <div class="amount-input-container">
                            <div class="currency-indicator" id="currencyIndicator">$</div>
                            <input type="number" id="amount" step="1" min="1" placeholder="85000" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label data-i18n="currency">Currency</label>
                        <div class="currency-buttons" id="currencyButtons">
                            <!-- Currency buttons will be populated by JavaScript -->
                        </div>
                    </div>

                    <div class="stock-section">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                        <h3>
                                <span id="stockTitle" data-i18n="stockRemaining">Bundle Stock</span>
                                <span class="info-tooltip" id="stockTooltip" data-tooltip-i18n="stockTooltip" data-tooltip="Leave empty for unlimited quantity">
                                <i class="fas fa-info-circle"></i>
                            </span>
                        </h3>
                            <div style="display: flex; flex-direction: column; gap: 6px; align-items: center;">
                                <div class="display-order-switch" id="assetTypeSwitch">
                                    <button type="button" class="order-btn active" data-asset="bills">
                                        <i class="fas fa-money-bill"></i> <span data-i18n="banknotes">Bills</span>
                                    </button>
                                    <button type="button" class="order-btn" data-asset="coins">
                                        <i class="fas fa-coins"></i> <span data-i18n="coins">Coins</span>
                                    </button>
                                </div>
                                <div style="display: flex; gap: 10px;">
                                    <div class="display-order-switch" id="stockModeSwitch">
                                        <button type="button" class="order-btn active" data-mode="bundles" title="Bundle Stock">
                                            <i class="fas fa-layer-group"></i>
                                        </button>
                                        <button type="button" class="order-btn" data-mode="bills" title="Loose Bills Stock">
                                            <i class="fas fa-money-bill"></i>
                                        </button>
                                    </div>
                                    <div class="display-order-switch" id="denominationOrderSwitch">
                                        <button type="button" class="order-btn active" data-order="high-to-low" title="Large to small denominations">
                                            <i class="fas fa-arrow-down-wide-short"></i>
                                        </button>
                                        <button type="button" class="order-btn" data-order="low-to-high" title="Small to large denominations">
                                            <i class="fas fa-arrow-up-short-wide"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="stock-multi-currency" id="stockMultiCurrency">
                            <!-- Multi-currency stock table will be populated by JavaScript -->
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="maxVariants" data-i18n="variantsCount">Number of Variants</label>
                        <input type="number" id="maxVariants" min="1" max="100" value="10">
                    </div>

                    <button type="submit" class="btn" id="calculateBtn">
                        <i class="fas fa-calculator"></i>
                        <span data-i18n="calculateBtn">Calculate</span>
                    </button>
                </form>
            </div>

            <div class="results-panel">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                    <h2><i class="fas fa-chart-bar"></i> <span data-i18n="results">Results</span></h2>
                    <div class="display-order-switch" style="display: none;" id="displayOrderSwitch">
                        <button type="button" class="order-btn" data-order="denomination-first" title="50 × 30 bundles">
                            <i class="fas fa-money-bill"></i>×<i class="fas fa-layer-group"></i>
                        </button>
                        <button type="button" class="order-btn" data-order="quantity-first" title="30 bundles × 50">
                            <i class="fas fa-layer-group"></i>×<i class="fas fa-money-bill"></i>
                        </button>
                    </div>
                </div>
                <div id="results">
                    <div class="loading" style="display: none;">
                        <i class="fas fa-spinner"></i>
                        <p data-i18n="calculating">Calculating optimal variants...</p>
                    </div>
                    <div id="initialMessage">
                        <p style="text-align: center; color: var(--text-secondary); padding: 40px;">
                            <i class="fas fa-arrow-left" style="font-size: 2rem; margin-bottom: 10px;"></i><br>
                            <span data-i18n="initialMessage">Enter order parameters and click "Calculate"</span>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Custom Dialog Modal -->
    <div class="custom-dialog-modal" id="customDialog">
        <div class="custom-dialog-content">
            <div class="custom-dialog-header">
                <h3 id="dialogTitle"></h3>
            </div>
            <div class="custom-dialog-body">
                <p id="dialogMessage"></p>
            </div>
            <div class="custom-dialog-footer">
                <button class="dialog-btn dialog-btn-secondary" id="dialogCancelBtn" data-i18n="cancel">Cancel</button>
                <button class="dialog-btn dialog-btn-primary" id="dialogConfirmBtn" data-i18n="confirm">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Block Visualization Modal -->
    <div class="block-modal" id="blockModal">
        <div class="block-modal-content">
            <div class="block-modal-header">
                <div class="block-title" id="blockModalTitle" data-i18n="blockVisualization">Block Visualization</div>
            <button class="block-modal-close" id="closeBlockModal">&times;</button>
            </div>
            <div class="block-modal-body">
            <div class="block-visualization">
                <div class="block-3d" id="block3d">
                    <!-- Will be populated by JavaScript -->
                </div>
                </div>
                <div id="partialPacksLegend" class="partial-packs-legend" style="display: none;">
                </div>
            </div>
            <div class="block-modal-footer">
                    <button class="viz-btn execute-order-btn" id="executeOrderBtn" data-i18n="executeOrder">Execute Order</button>
                    <button class="viz-btn" onclick="document.getElementById('blockModal').classList.remove('show')" data-i18n="closeDialog">Close</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
